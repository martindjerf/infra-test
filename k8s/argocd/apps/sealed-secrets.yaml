apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/martindjerf/infra-test
    targetRevision: main
    path: k8s/sealed-secrets/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false