apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata: 
  name: disallow-latest-tag
spec: 
  validationFailureAction: Enforce
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - argocd
                - ingress-nginx
                - falco
                - velero
      validate:
        message: "Image tag must be specified and cannot be 'latest'."
        pattern:
          spec:
            containers:
              - image: "?*:?*"
    - name: disallow-latest
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - argocd
                - ingress-nginx
                - falco
                - velero
      validate:
        message: "Image tag 'latest' is not allowed."
        pattern:
          spec:
            containers:
              - image: "!*:latest"